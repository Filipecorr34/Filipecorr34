name: Generate snake game

on:
  schedule:
    # Executa a cada 12 horas
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    name: Jobs to update datas
    runs-on: ubuntu-latest
    
    # PERMISSÃO NECESSÁRIA PARA O BOT FAZER O COMMIT NA BRANCH OUTPUT
    permissions:
      contents: write 

    steps:
      # Gera a animação da cobrinha
      - uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: Filipecorr34
          # Novo formato: o caminho do arquivo e a cor da cobra juntos
          outputs: |
            dist/github-contribution-grid-snake2.svg?color_snake=blue

      # Envia os arquivos gerados para a branch "output"
      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
